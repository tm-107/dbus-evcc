[DEFAULT]
AccessType = OnPremise
SignOfLifeLog = 1
#Default = 43. Count up for every additional loadpoint
Deviceinstance = 43
#Read readme.md first! Default = 0. Count up for every additional loadpoint
LoadpointInstance = 0
# Charger AC-Position: 0 = AC out, 1 = AC in
AcPosition = 1
# are chargeVoltages given in http://[evcc-ip]:7070/api/state under "loadpoints"? 1 = yes, 0 = no
SetVoltages = 0
# are chargeCurrents given in http://[evcc-ip]:7070/api/state under "loadpoints"? 1 = yes, 0 = no
SetCurrents = 0
# interval for evcc api calls in ms (keep in mind that evcc has a cycle of 30s by default)
ApiInterval = 20000

[ONPREMISE]
Host=192.168.1.2:7070
